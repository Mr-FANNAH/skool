<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <link rel="stylesheet" href="englishstyle.css" />
</head>

<body>
  <main class="reader-container">
    <div class="reader-header">
<a href="index.html" class="lesson-label">
    <i class="fa-solid fa-arrow-left"></i>
    << Go back to Home
</a>

    </div>

    <section class="reading-card">
      <div
        id="readingText"
        class="reading-text"
        aria-live="polite"
      ></div>

      <div class="progress-container">
        <div class="progress-track">
          <div id="progressFill" class="progress-fill"></div>
        </div>

        <span id="progressText">0%</span>
      </div>

      <div class="controls">
        <button id="playButton" class="primary-button">
          ▶ Read
        </button>

        <button id="pauseButton">
          ⏸ Pause
        </button>

        <button id="restartButton">
          ↻ Restart
        </button>

        <label class="speed-control">
          Speed

          <select id="speedSelect">
            <option value="0.6">0.6×</option>
            <option value="0.8">0.8×</option>
            <option value="1" selected>1×</option>
            <option value="1.2">1.2×</option>
            <option value="1.5">1.5×</option>
          </select>
        </label>
      </div>

      <p id="statusText" class="status-text">
        Press “Read” to start the lesson.
      </p>
    </section>
  </main>

  <!-- If you later record real audio for this lesson, add:
       <audio id="lessonAudio" src="lesson.mp3" preload="auto"></audio>
       and set AUDIO_SRC / WORD_TIMINGS below — script.js will
       automatically switch from the TTS clock to the real
       audio.currentTime clock. -->

  <script src="englishscript.js"></script>
</body>
</html>
