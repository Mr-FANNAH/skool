	<script type="text/template" id="perspective-The Systemic Perspective"># [23-year-old man charged with attempted murder using scissors](https://www.dr.dk/nyheder/seneste/23-aarig-mand-er-sigtet-drabsforsoeg-med-saks) (Perspective #7: The Systemic Perspective)
## 1 – The Criminal Justice System  
### 1.1 – 1 – Legal system reactive, not preventative  
#### 1.1.1 – 1 – No early intervention prior to violence  
#### 1.1.2 – 2 – Offender now faces harsh penalties  
#### 1.1.3 – 3 – Case highlights gap between crime and care  
### 1.2 – 1 – Overreliance on pre-trial detention  
#### 1.2.1 – 1 – Long waits erode presumption of innocence  
#### 1.2.2 – 2 – Detention used as control tool

### 1.3 – 1 – Criminal classification escalates quickly  
#### 1.3.1 – 1 – Attempted murder vs aggravated assault debate

## 2 – Mental Health & Social Support Systems  
### 2.1 – 1 – Possible untreated psychological issues  
#### 2.1.1 – 1 – Signs of instability ignored  
#### 2.1.2 – 2 – No public history revealed yet

### 2.2 – 1 – Crisis response still police-centered  
#### 2.2.1 – 1 – Escalation risk when law enforcers are first responders  
#### 2.2.2 – 2 – Co-response mental health teams rare  
#### 2.2.3 – 3 – Trauma-informed approaches could de-escalate more safely  
### 2.3 – 1 – Stigma around young men and mental health  
#### 2.3.1 – 1 – Cultural norms discourage emotional expression  
#### 2.3.2 – 2 – Few seek or receive counseling

## 3 – Weapon Access and Everyday Violence  
### 3.1 – 1 – Objects of violence often improvised  
#### 3.1.1 – 1 – Scissors = common, overlooked household weapon  
#### 3.1.2 – 2 – Bans focus on guns, not close-contact weapons  
#### 3.1.3 – 3 – "Weaponization of the ordinary" deserves policy focus  
### 3.2 – 1 – Violence as impulsive social breakdown  
#### 3.2.1 – 1 – Momentary rage leads to life-altering events  
#### 3.2.2 – 2 – Conflict resolution skills rarely taught  
#### 3.2.3 – 3 – Programs teaching emotional regulation can reduce harm  
### 3.3 – 1 – Community response culture  
#### 3.3.1 – 1 – Most people intervene too late or not at all  
#### 3.3.2 – 2 – Bystander effect still dominates  
#### 3.3.3 – 3 – Empowered intervention networks gaining traction  

## 4 – Socioeconomic Background & Mobility  
### 4.1 – 1 – Poverty links to risk of criminalization  
#### 4.1.1 – 1 – Limited options breed desperation  
#### 4.1.2 – 2 – Subtle class biases affect sentencing  
#### 4.1.3 – 3 – Universal access to opportunity could reduce cycles  
### 4.2 – 1 – Education and life trajectory  
#### 4.2.1 – 1 – School dropout = higher likelihood of incarceration  
#### 4.2.2 – 2 – Youth programs often underfunded

## 5 – Media & Public Perception

#### 6.1.2 – 2 – Jail time risks deeper radicalization

### 6.2 – 1 – For the victim

#### 6.2.3 – 3 – Restitution models include support beyond survival

#### 6.3.3 – 3 – Collective healing fosters shared responsibility  
</script>

	<script type="module">
		const selector = document.getElementById("perspective");
		const markmapDiv = document.querySelector(".markmap");
		const template = document.querySelector(".markmap script[type='text/template']");

		function updatePerspective(name) {
			const tpl = document.getElementById("perspective-" + name);
			if (!tpl) return;
			// Remove existing SVG if any
			const existingSvg = markmapDiv.querySelector('svg');
			if (existingSvg) {
				existingSvg.remove();
			}
			// Update the template content
			template.textContent = tpl.textContent;
			document.title = name + " – Markmap Viewer";
			// Force re-render by removing and re-adding the template
			template.remove();
			markmapDiv.appendChild(template);
			// Trigger markmap autoloader
			if (window.markmap && window.markmap.autoLoader) {
				window.markmap.autoLoader.renderAll();
			}
		}
		// Find all perspective templates and populate dropdown
		const templates = document.querySelectorAll("script[id^='perspective-']");
		templates.forEach(tpl => {
			const key = tpl.id.replace("perspective-", "");
			const opt = document.createElement("option");
			opt.value = key;
			opt.textContent = key;
			selector.appendChild(opt);
		});
		// Set initial perspective randomly when page loads
		window.addEventListener('load', () => {
			// Wait a bit for markmap to be fully loaded
			setTimeout(() => {
				const options = Array.from(selector.options).filter(opt => opt.value !== "");
				if (options.length > 0) {
					const initial = options[Math.floor(Math.random() * options.length)].value;
					selector.value = initial;
					updatePerspective(initial);
				}
			}, 100);
		});
		// Handle perspective changes
		selector.addEventListener("change", (e) => {
			updatePerspective(e.target.value);
		});
	</script>
