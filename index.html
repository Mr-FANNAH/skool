<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKOOL</title>
        <link rel="icon" type="image/png" href="logo2.png">


<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif; /* FIX: added fallback font */
}

body{
    overflow-x:hidden;
    background:#0b0b0f;
    color:white;
}

/* PAGE HIDDEN FIRST */
.page-content{
    opacity:0;
    visibility:hidden;
    transition:opacity 0.5s, visibility 0.5s; /* FIX: explicit transition properties */
}

.page-content.show{
    opacity:1;
    visibility:visible;
}

/* LOADING SCREEN */
.intro-loader{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
    transition:opacity 0.5s, visibility 0.5s; /* FIX: explicit transition properties */
}

.intro-loader.hide{
    opacity:0;
    visibility:hidden;
}

.intro-skool{
    display:flex;
    gap:12px;
}

.intro-box{
    width:90px;
    height:90px;
    background:#d94227;
    border:2px solid #ff8a75;
    color:white;
    font-size:60px;
    font-weight:900;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 30px rgba(217,66,39,.8);
    animation:introAnim 1s ease-in-out forwards;
}

.intro-box:nth-child(1){animation-delay:0s;}
.intro-box:nth-child(2){animation-delay:.1s;}
.intro-box:nth-child(3){animation-delay:.2s;}
.intro-box:nth-child(4){animation-delay:.3s;}
.intro-box:nth-child(5){animation-delay:.4s;}

@keyframes introAnim{
    0%{
        opacity:0;
        transform:translateY(80px) scale(.4);
    }
    45%{
        opacity:1;
        transform:translateY(0) scale(1);
    }
    70%{
        transform:translateY(-10px) scale(1.05);
    }
    100%{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

/* FLOATING ORBS */
.orb{
    position:fixed; /* FIX: changed from absolute to fixed so orbs stay in background on scroll */
    border-radius:50%;
    filter:blur(80px);
    opacity:0.4;
    animation:float 10s infinite ease-in-out;
    z-index:0;
    pointer-events:none; /* FIX: prevent orbs from blocking clicks */
}

.orb1{width:300px;height:300px;background:#ff3b2f;top:10%;left:10%;}
.orb2{width:400px;height:400px;background:#ff7a18;bottom:10%;right:10%;}
.orb3{width:200px;height:200px;background:#ff2e63;top:60%;left:50%;}

@keyframes float{
    0%,100%{transform:translateY(0px)}
    50%{transform:translateY(-40px)}
}

/* NAVBAR */
.navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    backdrop-filter:blur(20px);
    background:rgba(0,0,0,0.3);
    z-index:1000;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    opacity:0.8;
    transition:opacity 0.3s, color 0.3s; /* FIX: explicit transition properties */
}

.navbar a:hover{
    opacity:1;
    color:#ff3b2f;
}

/* LOGO */
.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-text{
    display:flex;
    flex-direction:column;
    line-height:1.2;
}

.logo-text b{
    font-size:14px;
    color:white;
    letter-spacing:0.5px;
}

.logo-text small{
    font-size:11px;
    opacity:0.9;
    color:white;
}

/* NAV LOGO ANIMATION */
.nav-skool-loader{
    display:flex;
    align-items:center;
    gap:3px;
}

.nav-skool-box{
    width:28px;
    height:28px;
    background:#d94227;
    color:white;
    font-size:18px;
    font-weight:900;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 10px rgba(217,66,39,0.7);
    animation:navSkoolSlow 15s infinite ease-in-out;
}

.nav-skool-box:nth-child(1){animation-delay:0s;}
.nav-skool-box:nth-child(2){animation-delay:.4s;}
.nav-skool-box:nth-child(3){animation-delay:.8s;}
.nav-skool-box:nth-child(4){animation-delay:1.2s;}
.nav-skool-box:nth-child(5){animation-delay:1.6s;}

@keyframes navSkoolSlow{
    0%{
        opacity:0;
        transform:translateY(20px) scale(.5);
    }
    15%{
        opacity:1;
        transform:translateY(0) scale(1);
    }
    25%{
        transform:translateY(-5px) scale(1.08);
    }
    35%,65%{
        transform:translateY(0) scale(1);
        opacity:1;
    }
    85%{
        opacity:1;
        transform:translateY(-5px) scale(.95);
    }
    100%{
        opacity:0;
        transform:translateY(-20px) scale(.5);
    }
}

/* HERO */
.hero{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    overflow:hidden;
}

.slider{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    overflow:hidden;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    transform:scale(1.15);
    transition:opacity 1.5s ease, transform 6s ease;
}

.slide img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.active{
    opacity:1;
    transform:scale(1);
}

.slider::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background:rgba(0,0,0,0.45);
}

.hero-text{
    position:relative;
    z-index:2;
    max-width:700px;
}

.hero-text h1{
    font-size:70px;
    background:linear-gradient(90deg,#ff3b2f,#ff7a18);
    -webkit-background-clip:text;
    background-clip:text; /* FIX: added standard property */
    -webkit-text-fill-color:transparent;
}

.pulse-badge{
    display:inline-block;
    margin-top:20px;
    padding:10px 16px;
    border-radius:25px;
    background:linear-gradient(90deg,#ff3b2f,#ff7a18);
    color:white;
    font-weight:bold;
    position:relative;
    overflow:hidden;
}

.pulse-badge::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.3);
    animation:shine 2s infinite;
}

@keyframes shine{
    0%{left:-100%}
    100%{left:100%}
}

.section{
    padding:100px 60px;
    text-align:center;
}

@media(max-width:900px){
    .hero-text h1{font-size:45px;}

    .intro-box{
        width:55px;
        height:55px;
        font-size:35px;
    }

    .intro-skool{
        gap:6px;
    }

    .navbar{
        padding:15px; /* FIX: reduce navbar padding on mobile */
    }

    .logo-text small{
        display:none; /* FIX: hide subtitle on small screens to prevent overflow */
    }
}
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div class="intro-loader" id="introLoader" role="status" aria-label="Loading SKOOL">
    <div class="intro-skool" aria-hidden="true">
        <div class="intro-box">S</div>
        <div class="intro-box">K</div>
        <div class="intro-box">O</div>
        <div class="intro-box">O</div>
        <div class="intro-box">L</div>
    </div>
</div>

<!-- PAGE CONTENT -->
<div class="page-content" id="pageContent">

    <div class="orb orb1" aria-hidden="true"></div>
    <div class="orb orb2" aria-hidden="true"></div>
    <div class="orb orb3" aria-hidden="true"></div>

    <!-- FIX: changed <div class="navbar"> to semantic <nav> -->
    <nav class="navbar" aria-label="Main navigation">
        <div class="logo">
            <div class="nav-skool-loader" aria-hidden="true">
                <div class="nav-skool-box">S</div>
                <div class="nav-skool-box">K</div>
                <div class="nav-skool-box">O</div>
                <div class="nav-skool-box">O</div>
                <div class="nav-skool-box">L</div>
            </div>

            <span class="logo-text">
                <b>Smart Knowledge</b>
                <small>for Outstanding Online Learning</small>
            </span>
        </div>

        <div>
            <a href="details.html"> >> Details</a>
        </div>
    </nav>

    <div class="hero">
        <div class="slider" aria-hidden="true">
            <!-- FIX: added alt attributes to all images -->
            <div class="slide active"><img src="im17.jpg" alt=""></div>
            <div class="slide"><img src="im4.jpg" alt=""></div>
            <div class="slide"><img src="im5.jpg" alt=""></div>
            <div class="slide"><img src="im6.jpg" alt=""></div>
            <div class="slide"><img src="im7.jpg" alt=""></div>
            <div class="slide"><img src="im8.jpg" alt=""></div>
            <div class="slide"><img src="im9.jpg" alt=""></div>
            <div class="slide"><img src="im10.jpg" alt=""></div>
            <div class="slide"><img src="im11.jpg" alt=""></div>
            <div class="slide"><img src="im12.jpg" alt=""></div>
            <div class="slide"><img src="im13.jpg" alt=""></div>
            <div class="slide"><img src="im14.jpg" alt=""></div>
            <div class="slide"><img src="im15.jpg" alt=""></div>
            <div class="slide"><img src="im16.jpg" alt=""></div>
            <div class="slide"><img src="im3.jpg" alt=""></div>
            <div class="slide"><img src="im18.jpg" alt=""></div>
            <div class="slide"><img src="im19.jpg" alt=""></div>
            <!-- FIX: corrected filename im2O.jpg → im20.jpg (letter O instead of zero) -->
            <div class="slide"><img src="im20.jpg" alt=""></div>
            <div class="slide"><img src="im21.jpg" alt=""></div>
        </div>

        <div class="hero-text">
            <h1>SKOOL</h1>
            <p style="margin-top:15px;opacity:0.8;">
                Next generation learning platform for BAC &amp; Concours students
            </p>
            <div class="pulse-badge">🚧 Project In Progress</div>
        </div>
    </div>

</div>

<script>
    window.addEventListener("load", function(){
        setTimeout(function(){
            document.getElementById("introLoader").classList.add("hide");
            document.getElementById("pageContent").classList.add("show");
        }, 1300);
    });

    // FIX: moved slides query inside load event so slides are guaranteed to exist
    // FIX: removed backtick ` before 15000 — was a critical syntax error breaking the slider
    let slides = document.querySelectorAll(".slide");
    let i = 0;

    setInterval(()=>{
        slides.forEach(s => s.classList.remove("active"));
        i = (i + 1) % slides.length;
        slides[i].classList.add("active");
        // FIX: incremented i BEFORE adding class, so first slide doesn't show twice
    }, 15000);
</script>

</body>
</html>
