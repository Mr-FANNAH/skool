<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SKOOL: Plateforme d'apprentissage</title>
    <link rel="icon" type="image/png" href="logo2.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --red: #d94227;
        --orange: #ff7a18;
        --red-glow: rgba(217, 66, 39, 0.4);
        --bg: #07070a;
        --border: rgba(255, 255, 255, 0.08);
        --text: #e8e8f0;
        --muted: rgba(232, 232, 240, 0.55);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        overflow-x: hidden;
      }

      /* ─── LOADER ─── */
      #loader {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition:
          opacity 0.6s ease,
          visibility 0.6s ease;
      }
      #loader.hide {
        opacity: 0;
        visibility: hidden;
      }

      .loader-tiles {
        display: flex;
        gap: 10px;
      }

      .loader-tile {
        width: 82px;
        height: 82px;
        background: var(--red);
        border: 2px solid rgba(255, 138, 117, 0.5);
        color: #fff;
        font-family: "Space Grotesk", sans-serif;
        font-size: 54px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 30px var(--red-glow);
        opacity: 0;
        animation: tileIn 0.85s ease forwards;
      }
      .loader-tile:nth-child(1) {
        animation-delay: 0.05s;
      }
      .loader-tile:nth-child(2) {
        animation-delay: 0.15s;
      }
      .loader-tile:nth-child(3) {
        animation-delay: 0.25s;
      }
      .loader-tile:nth-child(4) {
        animation-delay: 0.35s;
      }
      .loader-tile:nth-child(5) {
        animation-delay: 0.45s;
      }

      @keyframes tileIn {
        0% {
          opacity: 0;
          transform: translateY(70px) scale(0.4);
        }
        50% {
          opacity: 1;
          transform: translateY(0) scale(1.05);
        }
        72% {
          transform: translateY(-8px);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      /* ─── PAGE ─── */
      #page {
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.5s,
          visibility 0.5s;
      }
      #page.show {
        opacity: 1;
        visibility: visible;
      }

      /* ─── NAVBAR ─── */
      nav.topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 70px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 48px;
        background: rgba(7, 7, 10, 0.75);
        backdrop-filter: blur(22px);
        border-bottom: 1px solid var(--border);
        z-index: 1000;
      }

      .logo-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }
      .logo-tiles {
        display: flex;
        gap: 3px;
      }
      .logo-tile {
        width: 27px;
        height: 27px;
        background: var(--red);
        border: 1px solid rgba(255, 138, 117, 0.4);
        color: #fff;
        font-family: "Space Grotesk", sans-serif;
        font-size: 16px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 9px var(--red-glow);
        animation: navPulse 5s infinite ease-in-out;
      }
      .logo-tile:nth-child(1) {
        animation-delay: 0s;
      }
      .logo-tile:nth-child(2) {
        animation-delay: 0.2s;
      }
      .logo-tile:nth-child(3) {
        animation-delay: 0.4s;
      }
      .logo-tile:nth-child(4) {
        animation-delay: 0.6s;
      }
      .logo-tile:nth-child(5) {
        animation-delay: 0.8s;
      }

      @keyframes navPulse {
        0%,
        100% {
          opacity: 0.35;
          transform: translateY(2px) scale(0.88);
        }
        20%,
        60% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
        40% {
          transform: translateY(-4px) scale(1.07);
        }
      }

      .logo-label {
        display: flex;
        flex-direction: column;
        line-height: 1.3;
      }
      .logo-label b {
        font-size: 13px;
        font-weight: 600;
        color: #fff;
      }
      .logo-label small {
        font-size: 10.5px;
        color: var(--muted);
      }

      .nav-links {
        display: flex;
        gap: 4px;
      }
      .nav-links a {
        color: var(--muted);
        text-decoration: none;
        font-size: 13.5px;
        padding: 7px 15px;
        border-radius: 8px;
        border: 1px solid transparent;
        transition:
          color 0.25s,
          background 0.25s,
          border-color 0.25s;
      }
      .nav-links a:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.06);
      }
      .nav-links a.cta {
        color: #fff;
        background: linear-gradient(90deg, var(--red), var(--orange));
        border-color: transparent;
        font-weight: 600;
      }
      .nav-links a.cta:hover {
        opacity: 0.88;
      }

      /* ─── HERO ─── */
      .hero {
        position: relative;
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* Slideshow */
      .slider {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      .slide {
        position: absolute;
        inset: 0;
        opacity: 0;
        transform: scale(1.12);
        transition:
          opacity 1.6s ease,
          transform 7s ease;
      }
      .slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .slide.active {
        opacity: 1;
        transform: scale(1);
      }

      /* dark overlay */
      .slider::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(7, 7, 10, 0.45) 0%,
          rgba(7, 7, 10, 0.3) 50%,
          rgba(7, 7, 10, 0.85) 100%
        );
      }

      /* Hero copy */
      .hero-copy {
        position: relative;
        z-index: 2;
        text-align: center;
        max-width: 780px;
        padding: 0 24px;
      }

      .hero-eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 5px 14px;
        border: 1px solid rgba(255, 253, 253, 0.45);
        border-radius: 20px;
        font-size: 12px;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: #fff;
        margin-bottom: 24px;
      }
      .hero-eyebrow span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #12d600;
        animation: blink 1.5s infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.15;
        }
      }

      .hero-copy h1 {
        font-family: "Space Grotesk", sans-serif;
        font-size: clamp(52px, 9vw, 110px);
        font-weight: 700;
        line-height: 0.95;
        background: linear-gradient(110deg, #ff4c2c);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 18px;
      }

      .hero-copy p {
        font-size: clamp(17px, 1.6vw, 17px);
        color: rgba(255, 255, 255, 0.7);
        max-width: 520px;
        margin: 0 auto 32px;
        line-height: 1.7;
      }

      .hero-actions {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 13px 28px;
        border-radius: 12px;
        background: linear-gradient(90deg, var(--red), var(--orange));
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        position: relative;
        overflow: hidden;
        transition:
          transform 0.25s,
          box-shadow 0.25s;
      }
      .btn-primary::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent
        );
        animation: shine 2.5s infinite;
      }
      @keyframes shine {
        100% {
          left: 200%;
        }
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(217, 66, 39, 0.45);
      }

      .btn-ghost {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 13px 28px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: rgba(255, 255, 255, 0.85);
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        transition:
          background 0.25s,
          border-color 0.25s;
      }
      .btn-ghost:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(255, 255, 255, 0.35);
      }

      /* Scroll indicator */
      .scroll-hint {
        position: absolute;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.4);
      }
      .scroll-arrow {
        width: 20px;
        height: 20px;
        border-right: 1.5px solid rgba(255, 255, 255, 0.35);
        border-bottom: 1.5px solid rgba(255, 255, 255, 0.35);
        transform: rotate(45deg);
        animation: arrowBounce 1.8s infinite;
      }
      @keyframes arrowBounce {
        0%,
        100% {
          transform: rotate(45deg) translateY(0);
          opacity: 0.4;
        }
        50% {
          transform: rotate(45deg) translateY(5px);
          opacity: 1;
        }
      }

      /* ─── RESPONSIVE ─── */
      @media (max-width: 860px) {
        nav.topbar {
          padding: 0 18px;
        }
        .logo-label small {
          display: none;
        }
        .loader-tile {
          width: 54px;
          height: 54px;
          font-size: 36px;
        }
        .loader-tiles {
          gap: 6px;
        }
      }

      /* ollllllllllllllllllllll */

      .skool-h1 {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: center;
        perspective: 600px;
        list-style: none;
      }

      .s-letter {
        width: 50px;
        height: 88px;
        color: #d94227 !important; /* ← force white text */
        -webkit-text-fill-color: #d94227; /* ← fix if gradient h1 overrides it */
        font-family: Arial, sans-serif;
        font-size: 58px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: flipY 5s ease-in-out infinite;
        transform-style: preserve-3d;
        line-height: 1;
      }

      .s-letter:nth-child(1) {
        animation-delay: 0s;
      }
      .s-letter:nth-child(2) {
        animation-delay: 0.22s;
      }
      .s-letter:nth-child(3) {
        animation-delay: 0.44s;
      }
      .s-letter:nth-child(4) {
        animation-delay: 0.66s;
      }
      .s-letter:nth-child(5) {
        animation-delay: 0.88s;
      }

      @keyframes flipY {
        0%,
        40%,
        100% {
          transform: rotateY(0deg);
        }
        20% {
          transform: rotateY(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- LOADER -->
    <div id="loader" role="status" aria-label="Chargement de SKOOL">
      <div class="loader-tiles" aria-hidden="true">
        <div class="loader-tile">S</div>
        <div class="loader-tile">K</div>
        <div class="loader-tile">O</div>
        <div class="loader-tile">O</div>
        <div class="loader-tile">L</div>
      </div>
    </div>

    <!-- PAGE -->
    <div id="page">
      <!-- NAVBAR -->
      <nav class="topbar" aria-label="Navigation principale">
        <a href="index.html" class="logo-wrap" aria-label="Accueil SKOOL">
          <div class="logo-tiles" aria-hidden="true">
            <div class="logo-tile">S</div>
            <div class="logo-tile">K</div>
            <div class="logo-tile">O</div>
            <div class="logo-tile">O</div>
            <div class="logo-tile">L</div>
          </div>
          <span class="logo-label">
            <b>Smart Knowledge</b>
            <small>for Outstanding Online Learning</small>
          </span>
        </a>
      </nav>

      <!-- HERO -->
      <section class="hero">
        <!-- Slideshow -->
        <div class="slider" aria-hidden="true">
          <div class="slide active"><img src="im17.jpg" alt="" /></div>
          <div class="slide"><img src="im4.jpg" alt="" /></div>
          <div class="slide"><img src="im5.jpg" alt="" /></div>
          <div class="slide"><img src="im6.jpg" alt="" /></div>
          <div class="slide"><img src="im7.jpg" alt="" /></div>
          <div class="slide"><img src="im8.jpg" alt="" /></div>
          <div class="slide"><img src="im9.jpg" alt="" /></div>
          <div class="slide"><img src="im10.jpg" alt="" /></div>
          <div class="slide"><img src="im11.jpg" alt="" /></div>
          <div class="slide"><img src="im12.jpg" alt="" /></div>
          <div class="slide"><img src="im13.jpg" alt="" /></div>
          <div class="slide"><img src="im14.jpg" alt="" /></div>
          <div class="slide"><img src="im15.jpg" alt="" /></div>
          <div class="slide"><img src="im16.jpg" alt="" /></div>
          <div class="slide"><img src="im3.jpg" alt="" /></div>
          <div class="slide"><img src="im18.jpg" alt="" /></div>
          <div class="slide"><img src="im19.jpg" alt="" /></div>
          <div class="slide"><img src="im20.jpg" alt="" /></div>
          <div class="slide"><img src="im21.jpg" alt="" /></div>
        </div>

        <!-- Copy -->
        <div class="hero-copy">
          <div class="hero-eyebrow"><span></span> Projet en cours — 2027</div>
          <h1 class="skool-h1" aria-label="SKOOL">
            <span class="s-letter">S</span>
            <span class="s-letter">K</span>
            <span class="s-letter">O</span>
            <span class="s-letter">O</span>
            <span class="s-letter">L</span>
          </h1>
          <p>
            La plateforme d'apprentissage de nouvelle génération pour les
            étudiants BAC &amp; Concours au Maroc.
          </p>
          <div class="hero-actions">
            <a href="details.html" class="btn-primary">Découvrir le projet →</a>
            <a href="details.html" class="btn-ghost">En savoir plus</a>
          </div>
        </div>

        <div class="scroll-hint" aria-hidden="true">
          <div class="scroll-arrow"></div>
          <span>Défiler</span>
        </div>
      </section>
    </div>

    <script>
      // Loader
      window.addEventListener("load", function () {
        setTimeout(function () {
          document.getElementById("loader").classList.add("hide");
          document.getElementById("page").classList.add("show");
        }, 1000);
      });

      // Slideshow
      const slides = document.querySelectorAll(".slide");
      let current = 0;
      setInterval(function () {
        slides[current].classList.remove("active");
        current = (current + 1) % slides.length;
        slides[current].classList.add("active");
      }, 30000);
    </script>
  </body>
</html>
